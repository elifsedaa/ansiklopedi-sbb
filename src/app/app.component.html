<!-- Header -->
<header class="header">
  <div class="header-main">
    <div class="container">
      <div class="header-content">
        <div class="logo">
          <a routerLink="/">
            <img src="assets/images/logo.png" alt="Sakarya Belediyesi" class="logo-img">
            <div class="logo-text">
              <h1>{{ title }}</h1>
              <span>Bilginin Kapısı</span>
            </div>
          </a>
        </div>

        <nav class="main-nav" [class.active]="isMenuOpen">
          <ul class="nav-list">
            <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Ana Sayfa</a></li>
            <li><a routerLink="/publications" routerLinkActive="active">Yayınlar</a></li>
            <li><a routerLink="/categories" routerLinkActive="active">Kategoriler</a></li>
            <li><a routerLink="/add-publication" routerLinkActive="active">Yayın Ekle</a></li>
          </ul>
        </nav>

        <div class="header-actions">
          <button class="search-btn" (click)="toggleSearch()" aria-label="Arama">
            <i class="fas fa-search"></i>
          </button>
          <button class="menu-btn" (click)="toggleMenu()" aria-label="Menü">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Search Overlay -->
  <div class="search-overlay" [class.active]="isSearchOpen">
    <div class="search-container">
      <div class="search-box">
        <form (ngSubmit)="onSearchSubmit()">
          <input
            type="text"
            class="search-input"
            [(ngModel)]="searchQuery"
            name="search"
            placeholder="Ansiklopedide arama yapın..."
            autocomplete="off">
          <button type="submit" class="search-submit">
            <i class="fas fa-search"></i>
          </button>
        </form>
        <button class="search-close" (click)="closeSearch()">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- Main Content -->
<main class="main-content">
  <router-outlet></router-outlet>
</main>

<!-- Footer -->
<footer class="footer">
  <div class="footer-main">
    <div class="container">
      <p>&copy; 2025 Sakarya Belediyesi. Tüm hakları saklıdır.</p>
    </div>
  </div>
</footer>
